services:
  - type: web
    name: openhouseboss-api
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      # In-app A/B diarization test (/sessions/{id}/abtest) calls these in
      # addition to AAI. Set in the Render dashboard. Missing keys produce a
      # per-provider error in the response rather than failing the request.
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: SPEECHMATICS_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
      # MLS Grid replication — token + base URL set in the Render dashboard
      # (sync:false). MLS_GRID_BASE_URL switches between api.mlsgrid.com and
      # api-demo.mlsgrid.com. MLS_DB_PATH points the SQLite mirror at the
      # mounted disk so it survives restarts.
      - key: MLS_GRID_TOKEN
        sync: false
      - key: MLS_GRID_BASE_URL
        sync: false
      - key: MLS_GRID_ORIGINATING_SYSTEM
        value: nwmls
      - key: MLS_DB_PATH
        value: /opt/render/project/src/sessions/mls.db
    # Persistent disk mounted at <workdir>/sessions so transcripts + recorded
    # audio survive redeploys and restarts. Without this, the container's
    # filesystem is ephemeral and sessions vanish on every push.
    disk:
      name: sessions
      mountPath: /opt/render/project/src/sessions
      sizeGB: 10
