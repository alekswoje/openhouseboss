services:
  - type: web
    name: openhouseboss-api
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
    # Persistent disk mounted at <workdir>/sessions so transcripts + recorded
    # audio survive redeploys and restarts. Without this, the container's
    # filesystem is ephemeral and sessions vanish on every push.
    disk:
      name: sessions
      mountPath: /opt/render/project/src/sessions
      sizeGB: 10
