name: OpenHouseBoss
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

# Only ship a scheme for the main app — widget extensions can't be launched
# standalone (Xcode tries to "Run" them and fails with
# deviceprocesscontrolservice Code=8). The widget is embedded automatically
# via the OpenHouseBoss → OpenHouseBossWidgets target dependency below.
schemes:
  OpenHouseBoss:
    build:
      targets:
        OpenHouseBoss: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  OpenHouseBoss:
    type: application
    platform: iOS
    sources:
      - path: OpenHouseBoss
        excludes:
          - "Generated-Info.plist"
      # LiveActivityIntent — must compile into the app target too because
      # iOS dispatches the intent's `perform()` inside the host app's
      # process. The widget references the same type to render its button.
      - path: OpenHouseBossWidgets/StopRecordingIntent.swift
      - path: OpenHouseBossWidgets/ToggleMuteIntent.swift
    dependencies:
      - target: OpenHouseBossWidgets
    info:
      path: OpenHouseBoss/Generated-Info.plist
      properties:
        # Display name on the iPhone home screen + App Store listing. Set
        # explicitly so we can rebrand without renaming the Xcode target /
        # folder structure (which would churn the .pbxproj). The target
        # stays "OpenHouseBoss" internally; users see "Open House Copilot".
        CFBundleDisplayName: "Open House Copilot"
        # CFBundleName is what iOS surfaces in the native
        # ASWebAuthenticationSession permission dialog ("X Wants to Use Y
        # to Sign In"). Setting it explicitly so the OAuth flow shows the
        # branded name; otherwise iOS falls back to the target name.
        CFBundleName: "Open House Copilot"
        # App only uses HTTPS/TLS (Apple's standard encryption) — no custom
        # crypto, no proprietary algorithms. Declaring exempt here so App
        # Store Connect doesn't prompt for export-compliance docs per build.
        ITSAppUsesNonExemptEncryption: false
        # All networking goes to https://api.openhousecopilot.com — no
        # cleartext exceptions needed. NSAllowsArbitraryLoads=true was a
        # leftover from local-dev (`http://<mac-lan-ip>:8000`); App Review
        # rejects apps with it set in production. Switch back via
        # localhost-only exception if local dev breaks.
        NSMicrophoneUsageDescription: "Record audio during open houses to identify speakers and generate follow-ups."
        NSFaceIDUsageDescription: "Authenticate to exit kiosk mode so only the agent can leave the sign-in screen."
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - audio
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        # Marketing/build version resolved from MARKETING_VERSION /
        # CURRENT_PROJECT_VERSION below — bump in one place when shipping.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openhouseboss.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: YJ85MR8WLM
        CODE_SIGN_ENTITLEMENTS: OpenHouseBoss/OpenHouseBoss.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"

  OpenHouseBossWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: OpenHouseBossWidgets
      # Shared with the main app — Live Activity attributes type lives in
      # the app's source tree so renames stay in sync between both targets.
      - path: OpenHouseBoss/RecordingActivityAttributes.swift
    info:
      path: OpenHouseBossWidgets/Info.plist
      properties:
        CFBundleDisplayName: OpenHouseBossWidgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openhouseboss.app.widgets
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: YJ85MR8WLM
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"
