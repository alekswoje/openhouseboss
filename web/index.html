<!doctype html>
<html lang="en" class="style-ai theme-dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Foyer — every open house, quietly remembered.</title>
  <link rel="icon" type="image/png" href="foyer-mark.png">
  <link rel="apple-touch-icon" href="foyer-mark.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital,wght@0,400;1,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="brand.css" />
  <style>
    html, body {
      margin: 0; padding: 0;
      background: var(--bg-deep);
      color: var(--cream);
      font-family: 'Geist', -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      scroll-behavior: smooth;
    }
    #root { min-height: 100vh; }

    /* Page-transition wrapper. App.js sets data-phase to drive the fade. */
    .route-frame {
      transition: opacity 220ms ease, transform 260ms cubic-bezier(0.2, 0.7, 0.2, 1);
    }
    .route-frame[data-phase="out"]   { opacity: 0; transform: translateY(6px); }
    .route-frame[data-phase="in"]    { opacity: 1; transform: translateY(0); }
    .route-frame[data-phase="idle"]  { opacity: 1; transform: translateY(0); }

    /* Same idea, but for swapping the active visitor inside session-detail. */
    .visitor-frame {
      transition: opacity 180ms ease, transform 200ms cubic-bezier(0.2, 0.7, 0.2, 1);
    }
    .visitor-frame[data-phase="out"]  { opacity: 0; transform: translateY(4px); }
    .visitor-frame[data-phase="in"]   { opacity: 1; transform: translateY(0); }
    .visitor-frame[data-phase="idle"] { opacity: 1; transform: translateY(0); }

    /* Make every button + clickable row breathe a little — the snap into
       :hover used to feel like a hard cut. */
    .btn,
    button,
    a,
    .lead-row,
    .stat-card,
    .nav-item,
    .queue-row,
    .chip,
    .turn-row,
    .user-card,
    .session-row {
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease,
                  transform 160ms cubic-bezier(0.2, 0.7, 0.2, 1), box-shadow 220ms ease, opacity 160ms ease;
    }
    .btn:hover,
    .lead-row:hover,
    .stat-card:hover,
    .queue-row:hover,
    .session-row:hover {
      transform: translateY(-1px);
    }
    .lead-row:active,
    .btn:active,
    .queue-row:active,
    .session-row:active {
      transform: translateY(0);
    }

    /* Cards: gold border + soft brass glow lift on hover.  */
    .stat-card {
      cursor: default;
      border: 1px solid var(--hairline);
    }
    .stat-card:hover {
      border-color: rgba(196, 162, 82, 0.45);
      box-shadow: 0 14px 36px -22px rgba(196, 162, 82, 0.55);
    }

    /* Lead rows in the "most recent session" feature list. */
    .lead-row {
      cursor: pointer;
      padding-left: 4px;
      padding-right: 4px;
      margin-left: -4px;
      margin-right: -4px;
      border-radius: 6px;
    }
    .lead-row:hover {
      background: rgba(196, 162, 82, 0.06);
    }
    .lead-row:hover .lead-row-review {
      color: var(--gold);
      transform: translateX(2px);
    }
    .lead-row-review {
      transition: transform 200ms cubic-bezier(0.2, 0.7, 0.2, 1), color 200ms ease;
      display: inline-block;
    }

    /* Right-rail follow-up queue rows. */
    .queue-row {
      cursor: pointer;
      padding-left: 6px;
      padding-right: 6px;
      margin-left: -6px;
      margin-right: -6px;
      border-radius: 6px;
    }
    .queue-row:hover {
      background: rgba(196, 162, 82, 0.06);
    }

    /* Sidebar nav items. */
    .nav-item {
      cursor: pointer;
    }
    .nav-item:hover:not(.is-active) {
      background: rgba(196, 162, 82, 0.05);
    }
    .nav-item:hover:not(.is-active) .nav-item-label {
      color: var(--cream);
    }

    /* User card / dropdown in the sidebar foot. */
    .user-card { cursor: pointer; }
    .user-card:hover {
      border-color: rgba(196, 162, 82, 0.4);
      background: rgba(196, 162, 82, 0.04);
    }

    /* Recent-session list in session-detail's left rail. */
    .session-row {
      cursor: pointer;
      padding-left: 6px; padding-right: 6px;
      margin-left: -6px; margin-right: -6px;
      border-radius: 6px;
    }
    .session-row:hover { background: rgba(196, 162, 82, 0.06); }

    /* Filter chips (All / Buyer / Seller / Browser). */
    .chip { cursor: pointer; }
    .chip:hover:not(.is-active) {
      background: rgba(196, 162, 82, 0.06);
      border-color: rgba(196, 162, 82, 0.4) !important;
      color: var(--gold) !important;
    }

    /* Hover state on transcript turn rows. */
    .turn-row { cursor: pointer; border-radius: 6px; padding-left: 8px; padding-right: 8px; margin-left: -8px; margin-right: -8px; }
    .turn-row:hover { background: rgba(196, 162, 82, 0.04); }

    /* Generic <a> hover for inline links that fall through to anchor styling. */
    a { transition: color 160ms ease, opacity 160ms ease, transform 160ms ease; }

    /* Buttons get a subtle glow on hover. */
    .btn:hover {
      border-color: rgba(196, 162, 82, 0.45);
    }
    .btn.btn-primary:hover {
      box-shadow: 0 14px 32px -18px rgba(196, 162, 82, 0.6);
    }

    /* Audio player — sticky bar pinned above the scroll area on session
       detail. Brand-styled play button + brass progress bar. */
    .audio-bar {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(15, 15, 18, 0.86);
      border-bottom: 1px solid var(--hairline);
      padding: 14px 48px;
      display: grid;
      grid-template-columns: 38px auto 1fr auto;
      gap: 16px;
      align-items: center;
    }
    .audio-play {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--gold);
      color: var(--ink-on-gold, #1a1610);
      border: 0;
      cursor: pointer;
      font-size: 14px;
      display: grid; place-items: center;
      box-shadow: 0 8px 24px -10px rgba(196, 162, 82, 0.6);
      transition: transform 140ms ease, box-shadow 200ms ease;
    }
    .audio-play:hover { transform: scale(1.05); }
    .audio-play:active { transform: scale(0.97); }
    .audio-play[disabled] { opacity: 0.5; cursor: not-allowed; }

    .audio-time {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--cream);
      letter-spacing: 0.06em;
      min-width: 44px;
      text-align: center;
    }
    .audio-track {
      position: relative;
      height: 24px;
      cursor: pointer;
      display: flex; align-items: center;
    }
    .audio-track-bg {
      position: absolute; left: 0; right: 0; height: 3px;
      background: var(--hairline);
      border-radius: 2px;
    }
    .audio-track-fill {
      position: absolute; left: 0; height: 3px;
      background: linear-gradient(90deg, var(--gold-deep, #8a7138) 0%, var(--gold) 100%);
      border-radius: 2px;
      box-shadow: 0 0 10px rgba(196, 162, 82, 0.45);
      transition: width 60ms linear;
    }
    .audio-track-knob {
      position: absolute;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 3px rgba(196, 162, 82, 0.18);
      transform: translate(-50%, 0);
      transition: width 60ms linear, left 60ms linear;
    }

    /* Visitor turn highlight while audio is playing inside that turn. */
    .turn-row.is-active {
      background: var(--gold-soft);
      border-radius: 6px;
      padding-left: 12px;
      padding-right: 12px;
      margin-left: -12px;
      margin-right: -12px;
      transition: background 200ms ease;
    }

    /* Send-button inline spinner (matches iPad ProgressView). */
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast-confirmation slide-down at top of main area (iPad parity). */
    .toast {
      animation: toastIn .28s ease both;
    }

    /* Floating demo-route switcher — bottom-right, low-key, doesn't fight editorial content. */
    .route-nav {
      position: fixed; bottom: 18px; right: 18px; z-index: 1000;
      display: inline-flex; gap: 2px;
      padding: 3px;
      background: rgba(10, 10, 12, 0.78);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--hairline);
      border-radius: 999px;
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: 0 8px 24px -8px rgba(0,0,0,0.6);
    }
    .route-nav a {
      padding: 6px 11px;
      border-radius: 999px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color .18s, background .18s;
    }
    .route-nav a:hover { color: var(--cream); }
    .route-nav a.is-active { color: #000; background: var(--cream); }

    /* Toast stack — fixed bottom-left so it doesn't collide with the route nav. */
    .toast-host {
      position: fixed; bottom: 18px; left: 18px; z-index: 1100;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
      max-width: 360px;
    }
    .toast {
      background: rgba(15, 15, 18, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 12px 16px 12px 14px;
      color: var(--cream);
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 12px;
      animation: toastIn .28s ease both;
      box-shadow: 0 20px 50px -20px rgba(0,0,0,0.7);
    }
    .toast.leaving { animation: toastOut .28s ease both; }
    .toast-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }
    .toast-dot.success { background: var(--sage); box-shadow: 0 0 8px var(--sage); }
    .toast-dot.info { background: var(--cream); }
    .toast-dot.warn { background: var(--terracotta); }
    @keyframes toastIn {
      from { transform: translateY(20px) scale(0.96); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes toastOut {
      from { transform: translateY(0); opacity: 1; }
      to   { transform: translateY(-8px); opacity: 0; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="hero-devices.jsx"></script>
  <script type="text/babel" src="landing.jsx"></script>
  <script type="text/babel" src="login.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="sessions-list.jsx"></script>
  <script type="text/babel" src="kiosk.jsx"></script>
  <script type="text/babel" src="session-detail.jsx"></script>
  <script type="text/babel" src="leads.jsx"></script>
  <script type="text/babel" src="profile.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    // Marketing routes ('home', 'sign in') are demo helpers visible to anyone.
    // App routes (everything else) sit behind the AppShell sidebar and assume
    // /auth/me succeeds — useFoyerData kicks unauthed users back to '#/'.
    // `kiosk: true` is a separate flag: those routes hide the route-nav and
    // any other agent-facing chrome so a walk-in guest can't escape.
    const ROUTES = [
      { hash: '#/',           label: 'Home',     El: () => <Landing />,     marketing: true },
      { hash: '#/login',      label: 'Sign in',  El: () => <Login />,       marketing: true },
      { hash: '#/app',        label: 'Today',    El: () => <Dashboard /> },
      { hash: '#/sessions',   label: 'Sessions', El: () => <SessionsList /> },
      { hash: '#/session',    label: 'Detail',   El: () => <SessionDetail /> },
      { hash: '#/kiosk',      label: 'Kiosk',    El: () => <KioskForm /> },
      { hash: '#/kiosk-live', label: 'Live',     El: () => <KioskLive />,   kiosk: true },
      // Dedicated CRM surface: per-lead detail with notes, tasks,
      // sent-email history, and scheduled-send queue.
      { hash: '#/leads',      label: 'Leads',    El: () => <LeadsInbox /> },
      // Settings — Gmail connect + account info. Cross-device: the same
      // refresh token works from the iPad once the agent signs in there.
      { hash: '#/profile',    label: 'Profile',  El: () => <ProfilePage /> },
    ];

    function useHashRoute() {
      const [hash, setHash] = useState(() => window.location.hash || '#/');
      useEffect(() => {
        const onHash = () => {
          setHash(window.location.hash || '#/');
          // Scroll to top on route change so the next screen starts fresh.
          window.scrollTo({ top: 0, behavior: 'instant' });
        };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);
      return hash;
    }

    // Toast bus. Any component can fire `window.foyerToast('Saved')` or
    // `window.foyerToast({ message: 'Saved', kind: 'success' })`.
    function ToastHost({ toasts }) {
      return (
        <div className="toast-host">
          {toasts.map(t => (
            <div key={t.id} className={'toast' + (t.leaving ? ' leaving' : '')}>
              <span className={'toast-dot ' + (t.kind || 'info')} />
              <span>{t.message}</span>
            </div>
          ))}
        </div>
      );
    }

    // Crossfade between routes: when the hash changes, start a brief fade-out
    // on the currently-rendered screen, swap, then fade back in. Keeps the
    // user oriented instead of snap-cutting the whole page.
    function useRouteTransition(targetHash) {
      const [shownHash, setShownHash] = useState(targetHash);
      const [phase, setPhase] = useState('idle');
      useEffect(() => {
        if (targetHash === shownHash) return;
        setPhase('out');
        const t1 = setTimeout(() => {
          setShownHash(targetHash);
          // Force-reset the transform before the in animation so we get a
          // visible enter rather than rendering at the destination instantly.
          requestAnimationFrame(() => setPhase('in'));
        }, 200);
        return () => clearTimeout(t1);
      }, [targetHash]);
      useEffect(() => {
        if (phase !== 'in') return;
        const t = setTimeout(() => setPhase('idle'), 260);
        return () => clearTimeout(t);
      }, [phase]);
      return { shownHash, phase };
    }

    function App() {
      const hash = useHashRoute();
      const { shownHash, phase } = useRouteTransition(hash);
      const [toasts, setToasts] = useState([]);

      useEffect(() => {
        window.foyerToast = (arg) => {
          const t = typeof arg === 'string' ? { message: arg } : arg;
          const id = Date.now() + Math.random();
          const entry = { id, message: t.message, kind: t.kind || 'success' };
          setToasts(curr => [...curr, entry]);
          setTimeout(() => setToasts(curr => curr.filter(x => x.id !== id)), 2600);
        };
        // Convenience navigator for JSX callsites that don't want to deal with hashes.
        window.foyerGo = (hash) => { window.location.hash = hash; };
        // Kick off Google sign-in. Backend handles the OAuth dance and
        // bounces back here with a session cookie set, landing on #/app.
        window.foyerSignIn = () => {
          window.location.href = '/auth/google/start?platform=web';
        };
        // Fetch the current user (if any). Returns null if not signed in.
        window.foyerMe = async () => {
          try {
            const r = await fetch('/auth/me', { credentials: 'include' });
            if (!r.ok) return null;
            return await r.json();
          } catch { return null; }
        };
      }, []);

      const route = ROUTES.find(r => r.hash === shownHash) || ROUTES[0];
      const Screen = route.El;
      const isKiosk = !!route.kiosk;

      // The floating route-switcher is a demo helper, not part of the
      // product. Hide it once the agent is inside the app shell — they
      // navigate via the sidebar there. Still show on marketing pages
      // (Home, Sign in) for the demo flow.
      const showRouteNav = !isKiosk && !!route.marketing;

      return (
        <>
          <div className="route-frame" data-phase={phase} key={shownHash}>
            <Screen />
          </div>
          <ToastHost toasts={toasts} />
          {showRouteNav && (
            <nav className="route-nav" aria-label="Foyer demo routes">
              {ROUTES.filter(r => !r.kiosk).map(r => (
                <a key={r.hash} href={r.hash} className={r.hash === hash ? 'is-active' : ''}>
                  {r.label}
                </a>
              ))}
            </nav>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
